<div class="login-page">

  <div class="login-box">

    <div class="login-header">
      <h2>📚 Library Login</h2>
      <p>Welcome back! Please log in to continue</p>
    </div>

    <div *ngIf="errorMessage" class="error-box">
      {{ errorMessage }}
    </div>

    <form #loginForm="ngForm" (ngSubmit)="onSubmit(loginForm)">

      <!-- USERNAME -->
      <div class="form-group">
        <label>Username</label>
        <input
          type="text"
          name="username"
          [(ngModel)]="username"
          required
          minlength="3"
          #usernameField="ngModel"
          placeholder="Enter username"
        />

        <div class="error" *ngIf="usernameField.touched && usernameField.invalid">
          <span *ngIf="usernameField.errors?.['required']">Username is required</span>
          <span *ngIf="usernameField.errors?.['minlength']">At least 3 characters</span>
        </div>
      </div>

      <!-- PASSWORD -->
      <div class="form-group">
        <label>Password</label>
        <input
          type="password"
          name="password"
          [(ngModel)]="password"
          required
          minlength="6"
          #passwordField="ngModel"
          placeholder="Enter password"
        />

        <div class="error" *ngIf="passwordField.touched && passwordField.invalid">
          <span *ngIf="passwordField.errors?.['required']">Password is required</span>
          <span *ngIf="passwordField.errors?.['minlength']">At least 6 characters</span>
        </div>
      </div>

      <button 
        type="submit" 
        [disabled]="loginForm.invalid || isLoading"
        class="login-btn"
      >
        <span *ngIf="!isLoading">Login</span>
        <span *ngIf="isLoading" class="btn-loading">
          <span class="mini-spinner"></span>
          Logging in...
        </span>
      </button>

    </form>

    <div class="register-text">
      Don’t have an account?
      <a routerLink="/register">Create one</a>
    </div>

  </div>

</div>
<style>
    .login-page {
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #1e3a8a, #2563eb);
  padding: 20px;
  font-family: 'Inter', sans-serif;
}

.login-box {
  background: white;
  width: 400px;
  max-width: 100%;
  padding: 40px;
  border-radius: 20px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.25);
  animation: fadeIn 0.3s ease-in-out;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

/* HEADER */
.login-header {
  text-align: center;
  margin-bottom: 30px;
}

.login-header h2 {
  margin: 0;
  font-size: 24px;
  font-weight: 600;
}

.login-header p {
  margin-top: 6px;
  font-size: 14px;
  color: #64748b;
}

/* FORM */
.form-group {
  margin-bottom: 20px;
  display: flex;
  flex-direction: column;
}

.form-group label {
  font-size: 13px;
  font-weight: 500;
  margin-bottom: 6px;
  color: #334155;
}

.form-group input {
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid #e2e8f0;
  font-size: 14px;
  transition: 0.2s ease;
}

.form-group input:focus {
  outline: none;
  border-color: #2563eb;
  box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
}

/* ERROR */
.error {
  margin-top: 6px;
  font-size: 12px;
  color: #dc2626;
}

.error-box {
  background: #fee2e2;
  color: #991b1b;
  padding: 10px 14px;
  border-radius: 12px;
  margin-bottom: 20px;
  font-size: 13px;
}

/* BUTTON */
.login-btn {
  width: 100%;
  padding: 10px;
  border-radius: 12px;
  border: none;
  background: linear-gradient(135deg, #2563eb, #1d4ed8);
  color: white;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: 0.2s ease;
}

.login-btn:hover:not(:disabled) {
  transform: scale(1.03);
}

.login-btn:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

/* LOADING INSIDE BUTTON */
.btn-loading {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 8px;
}

.mini-spinner {
  width: 14px;
  height: 14px;
  border: 2px solid rgba(255,255,255,0.5);
  border-top: 2px solid white;
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* REGISTER */
.register-text {
  text-align: center;
  margin-top: 20px;
  font-size: 13px;
}

.register-text a {
  color: #2563eb;
  text-decoration: none;
  font-weight: 500;
}

.register-text a:hover {
  text-decoration: underline;
}
</style>
