<!-- NAVBAR -->
<nav class="navbar">

  <!-- LOGO / BRAND -->
  <a routerLink="/books" class="logo">
    📚 <span>SmartLibrary</span>
  </a>

  <!-- NAV LINKS -->
  <div class="nav-links">

    <!-- BOOKS -->
    <a
      routerLink="/books"
      routerLinkActive="active"
      [routerLinkActiveOptions]="{exact:false}"
    >
      Books
    </a>

    <!-- MY BOOKS (ONLY NORMAL USER) -->
    <a
      *ngIf="currentUser && !isLibrarian"
      routerLink="/my-books"
      routerLinkActive="active"
    >
      My Books
    </a>

    <!-- LIBRARIAN NAVIGATION -->
    <ng-container *ngIf="isLibrarian">

      <a
        routerLink="/librarian/dashboard"
        routerLinkActive="active"
      >
        Dashboard
      </a>

      <a
        routerLink="/librarian/books"
        routerLinkActive="active"
      >
        Manage Books
      </a>

      <a
        routerLink="/librarian/users"
        routerLinkActive="active"
      >
        Users
      </a>

    </ng-container>

    <!-- USER SECTION -->
    <div *ngIf="currentUser" class="user-section">

      <span class="user-name">
        👋 {{ currentUser?.fullName }}
      </span>

      <button class="logout-btn" (click)="logout()">
        Logout
      </button>

    </div>

    <!-- AUTH LINKS -->
    <div *ngIf="!currentUser" class="auth-links">

      <a routerLink="/login" routerLinkActive="active">
        Login
      </a>

      <a
        routerLink="/register"
        routerLinkActive="active"
        class="register-btn"
      >
        Register
      </a>

    </div>

  </div>

</nav>

<!-- PAGE CONTENT -->
<div class="page-container">
  <router-outlet></router-outlet>
</div>


<!-- STYLES -->
<style>

/* ===== NAVBAR ===== */

.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 40px;
  height: 72px; /* Slightly taller for more "breathability" */
  background: #1e3a5f;
  border-bottom: 4px solid #c8a75d;
  box-shadow: 0 4px 14px rgba(0,0,0,0.1);
}

/* LOGO */

.logo {
  font-family: 'Montserrat', sans-serif; 
  font-size: 22px;
  font-weight: 700;
  text-decoration: none;
  color: white;
  display: flex;
  align-items: center;
  gap: 8px;
  letter-spacing: -0.5px;
}
.logo span {
  color: #c8a75d;
  font-weight: 400; /* Contrast weight for a modern look */
}

/* NAV LINKS */
.nav-links {
  display: flex;
  align-items: center;
   font-family: 'Montserrat', sans-serif; 
  gap: 28px; /* Increased gap for a cleaner look */
}

.nav-links a {
  text-decoration: none;
  font-size: 13px; /* Slightly smaller for a "pro" app feel */
  font-weight: 600;
  color: #94a3b8; /* Muted slate color for inactive links */
  transition: all 0.2s ease;
  text-transform: uppercase; /* Professional UI often uses uppercase for nav */
  letter-spacing: 0.05em;
}

/* HOVER & ACTIVE */
.nav-links a:hover {
  color: #ffffff;
}

.active {
  color: #c8a75d !important;
  position: relative;
}

/* Active Indicator Line */
.active::after {
  content: '';
  position: absolute;
  bottom: -24px; /* Aligns with the bottom of the 72px navbar */
  left: 0;
  width: 100%;
  height: 4px;
  background: #c8a75d;
}

/* USER SECTION */
.user-section {
  display: flex;
  align-items: center;
  gap: 16px;
  padding-left: 16px;
  border-left: 1px solid rgba(255,255,255,0.1); /* Divider for organization */
}

.user-name {
  font-size: 14px;
  font-weight: 500;
  color: #f1f5f9;
}

/* AUTH & BUTTONS */
.register-btn {
  padding: 8px 18px !important;
  background: #c8a75d;
  color: #1e293b !important;
  border-radius: 4px;
  font-weight: 700;
}

.logout-btn {
  padding: 8px 16px;
  background: transparent;
  color: #fca5a5; /* Softer red for professional look */
  border: 1px solid #7f1d1d;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  cursor: pointer;
  transition: 0.2s;
}

.logout-btn:hover {
  background: #ef4444;
  color: white;
  border-color: #ef4444;
}



/* USER SECTION */

.user-section{
  display:flex;
  align-items:center;
  gap:14px;
  margin-left:12px;
}

.user-name{
  font-size:13px;
  color:#f1f5f9;
   font-family: 'Montserrat', sans-serif; 
}

/* LOGIN / REGISTER */

.auth-links{
  display:flex;
  align-items:center;
  gap:12px;
 
}

.register-btn{
  padding:6px 14px;
  background:#c8a75d;
  color:#1e293b !important;
  border-radius:6px;
  font-weight:600;
}

.register-btn:hover{
  background:#b89449;
}

/* LOGOUT */

.logout-btn{
  padding:6px 14px;
  background:#ef4444;
  color:white;
  border:none;
  border-radius:6px;
  font-size:13px;
  cursor:pointer;
}

.logout-btn:hover{
  background:#dc2626;
}

/* PAGE CONTAINER */

.page-container{
  padding:30px;
  max-width:1200px;
  margin:auto;
}

/* RESPONSIVE */

@media(max-width:768px){

  .navbar{
    padding:0 20px;
  }

  .nav-links{
    gap:14px;
  }

  .user-name{
    display:none;
  }

}

</style>
