<div class="catalog-container">

  <!-- HEADER -->
  <div class="catalog-header">
    <div>
      <h1>Books Available</h1>
      <p>Discover and borrow your next read</p>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">

    <div class="search-box">
      <input
        #searchInput
        type="text"
        placeholder="Search by title or author..."
      />
    </div>

    <div class="category-box">
      <select
        [(ngModel)]="selectedCategory"
        (change)="filterByCategory()"
      >
        <option value="">All Categories</option>
        <option 
          *ngFor="let cat of categories; trackBy: trackByCat" 
          [value]="cat"
        >
          {{ cat }}
        </option>
      </select>
    </div>

  </div>

  <!-- LOADING -->
  <app-loading-spinner [isLoading]="isLoading"></app-loading-spinner>

  <!-- ERROR -->
  <div *ngIf="errorMessage" class="error-box">
    {{ errorMessage }}
  </div>

  <!-- EMPTY -->
  <div *ngIf="!isLoading && books.length === 0" class="empty-state">
    <h3>No books found</h3>
    <p>Try adjusting your search or category filter.</p>
  </div>

  <!-- BOOK GRID -->
  <div class="books-grid">
    <app-book-card
      *ngFor="let book of books; trackBy: trackByBookId"
      [book]="book"
      (borrowClicked)="onBorrowClicked($event)"
    ></app-book-card>
  </div>

  <!-- CONFIRM DIALOG -->
  <app-confirm-dialog
    [visible]="showConfirm"
    [message]="'Borrow this book? It will be due in 14 days.'"
    (confirmed)="confirmBorrow()"
    (cancelled)="cancelBorrow()"
  ></app-confirm-dialog>

</div>

<style>
    .catalog-container {
  padding: 40px;
  background: #f1f5f9;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
}

/* HEADER */
.catalog-header {
  margin-bottom: 30px;
}

.catalog-header h1 {
  font-size: 32px;
  font-weight: 600;
  margin: 0;
}

.catalog-header p {
  color: #64748b;
  margin-top: 6px;
}

/* FILTER BAR */
.filter-bar {
  display: flex;
  gap: 20px;
  margin-bottom: 30px;
  flex-wrap: wrap;
}

.search-box {
  flex: 1;
}

.search-box input {
  width: 100%;
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid #e2e8f0;
  font-size: 14px;
  transition: 0.2s ease;
}

.search-box input:focus {
  outline: none;
  border-color: #2563eb;
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

/* CATEGORY SELECT */
.category-box select {
  width: 220px;
  padding: 10px 14px;
  border-radius: 12px;
  border: 1px solid #e2e8f0;
  font-size: 14px;
  background: white;
  cursor: pointer;
  transition: 0.2s ease;
}

.category-box select:focus {
  outline: none;
  border-color: #2563eb;
}

/* ERROR */
.error-box {
  background: #fee2e2;
  color: #991b1b;
  padding: 12px 16px;
  border-radius: 12px;
  margin-bottom: 20px;
  font-weight: 500;
}

/* EMPTY STATE */
.empty-state {
  background: white;
  padding: 50px;
  text-align: center;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

/* GRID */
.books-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 24px;
  margin-top: 20px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .catalog-container {
    padding: 20px;
  }

  .filter-bar {
    flex-direction: column;
  }

  .category-box select {
    width: 100%;
  }
}
</style>
