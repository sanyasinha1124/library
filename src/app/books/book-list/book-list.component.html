<div class="catalog-container">

  <!-- HEADER -->
  <div class="catalog-header">
    <div>
      <h1>📚 Library Catalog</h1>
      <p>Browse, explore and borrow books from the collection</p>
    </div>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar">

    <div class="search-box">
      <input
        #searchInput
        type="text"
        placeholder="🔎 Search books by title or author..."
      />
    </div>

    <div class="category-box">
      <select
        [(ngModel)]="selectedCategory"
        (change)="filterByCategory()"
      >
        <option value="">All Categories</option>

        <option
          *ngFor="let cat of categories; trackBy: trackByCat"
          [value]="cat"
        >
          {{ cat }}
        </option>

      </select>
    </div>

  </div>

  <!-- LOADING -->
  <app-loading-spinner [isLoading]="isLoading"></app-loading-spinner>

  <!-- ERROR -->
  <div *ngIf="errorMessage" class="error-box">
    {{ errorMessage }}
  </div>

  <!-- EMPTY -->
  <div *ngIf="!isLoading && books.length === 0" class="empty-state">
    <h3>No books found</h3>
    <p>Try changing the search or category filter.</p>
  </div>

  <!-- BOOK GRID -->
  <div class="books-grid">

    <!-- <app-book-card
      *ngFor="let book of books; trackBy: trackByBookId"
      [book]="book"
      (borrowClicked)="onBorrowClicked($event)"
    ></app-book-card> -->
    <app-book-card
  *ngFor="let book of books"
  [book]="book"
  (borrowClicked)="onBorrowClicked($event)">
</app-book-card>
  </div>

  <!-- CONFIRM DIALOG -->
  <app-confirm-dialog
  *ngIf="showConfirm"
  message="Are you sure you want to borrow this book?"
  (confirm)="confirmBorrow()"
  (cancel)="cancelBorrow()">
</app-confirm-dialog>

</div>

<style>
.catalog-container {
  padding: 40px;
  background: #f8fafc;
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
}

/* HEADER */

.catalog-header {
  margin-bottom: 35px;
}

.catalog-header h1 {
  font-size: 34px;
  font-weight: 700;
  margin: 0;
  color: #1e3a8a;
}

.catalog-header p {
  margin-top: 6px;
  color: #64748b;
  font-size: 14px;
}

/* FILTER BAR */

.filter-bar {
  display: flex;
  gap: 20px;
  margin-bottom: 30px;
  flex-wrap: wrap;
  align-items: center;

  background: white;
  padding: 18px;
  border-radius: 14px;

  box-shadow: 0 6px 18px rgba(0,0,0,0.05);
}

/* SEARCH */

.search-box {
  flex: 1;
}

.search-box input {

  width: 100%;
  padding: 12px 16px;

  border-radius: 10px;
  border: 1px solid #e2e8f0;

  font-size: 14px;
  background: #f8fafc;

  transition: all 0.2s ease;
}

.search-box input:focus {

  outline: none;
  border-color: #2563eb;

  background: white;

  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
}

/* CATEGORY */

.category-box select {

  width: 220px;
  padding: 12px 14px;

  border-radius: 10px;
  border: 1px solid #e2e8f0;

  font-size: 14px;

  background: white;

  cursor: pointer;
}

.category-box select:focus {
  outline: none;
  border-color: #2563eb;
}

/* ERROR */

.error-box {

  background: #fee2e2;
  color: #b91c1c;

  padding: 14px 16px;

  border-radius: 10px;
  margin-bottom: 20px;

  font-weight: 500;
}

/* EMPTY STATE */

.empty-state {

  background: white;

  padding: 60px;
  text-align: center;

  border-radius: 14px;

  box-shadow: 0 10px 30px rgba(0,0,0,0.05);
}

.empty-state h3 {
  margin-bottom: 8px;
  color: #1e293b;
}

/* BOOK GRID */

.books-grid {

  display: grid;

  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));

  gap: 26px;
  margin-top: 10px;
}

/* RESPONSIVE */

@media (max-width: 768px) {

  .catalog-container {
    padding: 20px;
  }

  .filter-bar {
    flex-direction: column;
    align-items: stretch;
  }

  .category-box select {
    width: 100%;
  }

}
</style>
